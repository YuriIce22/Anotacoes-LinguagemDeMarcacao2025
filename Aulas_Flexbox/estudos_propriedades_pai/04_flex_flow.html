<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlexBox-04</title>
    <style>
        /* Personalização do Container e dos Itens */
        body {background-color: #ebd5d5;}
        .titulo {background-color: rgba(21, 134, 179, 0.418); width: 100%; text-align: center;}
        .pai {background-color: rgba(21, 134, 179, 0.418); border-radius: 15px; padding: 20px; gap: 10px;}
        .filhos { background-color: rgb(252, 240, 240); border: 1px solid rgba(0, 0, 0, 0.404); border-radius: 15px; padding: 20px;}
              
        /* CONFIGURAÇÃO - FLEX BOX */
        /* CONTAINER - (Pai) */
        .container.linha {
            display: flex;
            /* flex-direction: row;
            flex-wrap: wrap-reverse; */
            /* Shorthand */
            flex-flow: row wrap-reverse;
        }
                                                                                                                    
        .container.coluna {
            height: 150px;
            display: flex;
            /* flex-direction: column;
            flex-wrap: wrap-reverse; */
            /* Shorthand */
            flex-flow: column wrap-reverse;
        }

        /* ITEMS - (Filho) */
        .items {
            /* Config FLEX BOX */
            /* flex: auto; */
        }
    </style>

</head>

<body>
    <header>
        <h1 class="titulo">Estudos FlexBox-04</h1>
    </header>
    <main>
        <h2>Container (Pai) - Display:Flex (Padrão Linha)</h2>
        <div class="pai container linha">
            <div class="filhos items item-1">Item 01</div>
            <div class="filhos items item-2">Item 02</div>
            <div class="filhos items item-3">Item 03</div>
            <div class="filhos items item-4">Item 04</div>
        </div>

        <h2>Container (Pai) - Display:Flex (Padrão Coluna)</h2>
        <div class="pai container coluna">
            <div class="filhos items item-1">Item 01</div>
            <div class="filhos items item-2">Item 02</div>
            <div class="filhos items item-3">Item 03</div>
            <div class="filhos items item-4">Item 04</div>
        </div>

    </main>
</body>

</html>
